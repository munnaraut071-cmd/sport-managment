<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GYMKITS</title>

  <link rel="stylesheet" href="Gym.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">
    <a href="index.html" style="color:white;text-decoration: none;">

    GYM<span>KITS</span>
  </a>
</div>

  <nav>
    <a href="index.html">Home</a>
    <!-- Smooth scroll to GYM section -->
    <a href="#gymkits">Gym</a>
    <a href="gym.html">Fitness</a>
  </nav>

  <div class="icons">
    <i class="fa fa-search"></i>
    <i class="fa fa-bell"></i>
  </div>
</header>

<!-- Hero Section -->
<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1 class="title">
      <span class="Train">Train</span>
      <span class="Your">Your</span>
      <span class="Body"> Body</span>
    </h1>

    <p class="rank">#1 Fitness Center Today</p>

    <p class="desc">
      Fitness is not just a workout — it’s a lifestyle.
      Build strength, boost confidence, and transform your body with
      professional equipment and expert training.
    </p>
    <div class="buttons">
      <a href="https://www.youtube.com/watch?v=UBMk30rjy0o" target="_blank">
        <button class="play">
          <i class="fa fa-dumbbell"></i> Start Workout
        </button>
      </a>
    </div>
  </div>
</section>

<!-- Join & Pay Section -->
<div class="join-pay">
  <a href="Gym-join-pay.html">
    <button class="join-btn">
      <i class="fa-solid fa-user-plus"></i>
      Join Gym & Pay
    </button>
  </a>
</div>

<!-- Bottom Note -->
<div class="note">
  <span>Chitkara University</span> Himachal Pradesh
</div>

<!-- Gym Equipment section removed -->

<!-- Gym Accessories section removed -->

<!-- Optional JS for carousel scrolling -->
<script>
function scrollLeft(id){
  document.getElementById(id).scrollBy({left: -300, behavior: 'smooth'});
}
function scrollRight(id){
  document.getElementById(id).scrollBy({left: 300, behavior: 'smooth'});
}
</script>

</body>
</html>
